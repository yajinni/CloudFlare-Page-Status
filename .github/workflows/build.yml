name: Build Desktop Applications

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows Executable
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build executable with PyInstaller
        run: |
          pyinstaller --onefile --noconsole --name="Cloudflare Pages Status" cloudflare_pages_status.py

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Cloudflare-Pages-Status-Windows
          path: dist/Cloudflare Pages Status.exe

  build-macos:
    name: Build macOS App Bundle
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build app bundle with PyInstaller
        run: |
          pyinstaller --onefile --noconsole --name="Cloudflare Pages Status" cloudflare_pages_status.py

      - name: Compress macOS App Bundle
        run: |
          cd dist
          zip -r "Cloudflare_Pages_Status_macOS.zip" "Cloudflare Pages Status.app"

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Cloudflare-Pages-Status-macOS
          path: dist/Cloudflare_Pages_Status_macOS.zip

  create-release:
    name: Create GitHub Release
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: Cloudflare-Pages-Status-Windows
          path: dist-win

      - name: Download macOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: Cloudflare-Pages-Status-macOS
          path: dist-mac

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-win/Cloudflare Pages Status.exe
            dist-mac/Cloudflare_Pages_Status_macOS.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
